<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Americule</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0074D9;
  color: white;
  overflow-x: hidden;
}

.page {
  display: none;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

.page.active {
  display: block;
}

h1 {
  text-align: center;
}

/* Buttons */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #0057b7;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #003f7f;
}

/* Calibration */
.calibration-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 30px;
}

input {
  padding: 8px;
  width: 140px;
  text-align: center;
}

/* Products */
#products-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.product-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.product-row select,
.product-row input {
  padding: 6px;
}

.button-row {
  text-align: center;
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="page" id="page1">
<h1>Americule</h1>
<div style="text-align:center;">
<button onclick="goToPage(2)">Calibration</button>
<button onclick="goToPage(3)">Products Produced</button>
</div>
</div>

<!-- CALIBRATION -->
<div class="page" id="page2">
<h1>Calibration</h1>

<div class="calibration-container">
<input type="date" id="date">
<input type="number" id="A" placeholder="A">
<input type="number" id="B" placeholder="B">
<input type="number" id="C" placeholder="C">
<input type="number" id="D" placeholder="D">

<button id="enter">Enter</button>
<button onclick="goToPage(1)">Back</button>
</div>
</div>

<!-- PRODUCTS -->
<div class="page" id="page3">
<h1>Products Produced</h1>

<div id="products-container">
  <div class="product-row">
    <select class="product-dropdown">
      <option value="">Select Product</option>
      <option>1/2 Polyball</option>
      <option>5/8 Polyball</option>
      <option>11/16 Polyball</option>
      <option>3/4 Polyball</option>
      <option>7/8 Polyball</option>
      <option>1 Polyball</option>
      <option>1-1/8 Polyball</option>
      <option>30mm Polyball</option>
      <option>1-1/4 Polyball</option>
      <option>1-3/8 Polyball</option>
      <option>1-5/8 Polyball</option>
      <option>2 Polyball</option>
      <option>Polypan</option>
      <option>Polycube</option>
      <option>Stars</option>
      <option>SC Ball</option>
      <option>SC Cube</option>
      <option>Carlson Boot</option>
    </select>

    <input type="number" class="rounds-input" placeholder="Rounds">
    <input type="text" class="quantity-display" placeholder="Qty" readonly>
  </div>
</div>

<div class="button-row">
<button id="add-product">+</button>
</div>

<div class="button-row">
<button onclick="goToPage(1)">Back Home</button>
</div>
</div>

<script>

/* ---------------- NAV ---------------- */
let currentPage = 1;

function goToPage(p){
  document.querySelectorAll(".page").forEach(x => x.classList.remove("active"));
  document.getElementById("page"+p).classList.add("active");
  currentPage = p;
}

goToPage(1);

/* Arrow navigation */
document.addEventListener("keydown", (e) => {
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "SELECT") return;

  if (e.key === "ArrowRight" && currentPage < 3) goToPage(currentPage + 1);
  if (e.key === "ArrowLeft" && currentPage > 1) goToPage(currentPage - 1);
});


/* ---------------- CALIBRATION ---------------- */
const endpoint = "https://script.google.com/macros/s/AKfycbyHIP8Kjsr0ncpENuKn62GRozfW_vB3jrm05eD2UR6qMkqtilxIU3Igcdq8MopGl9Ys3g/exec";

document.getElementById("enter").addEventListener("click", () => {

  const data = {
    date: document.getElementById("date").value,
    A: document.getElementById("A").value,
    B: document.getElementById("B").value,
    C: document.getElementById("C").value,
    D: document.getElementById("D").value
  };

  fetch(endpoint, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(r => {
    alert(r.status);

    document.getElementById("date").value = "";
    ["A","B","C","D"].forEach(id => {
      document.getElementById(id).value = "";
    });
  });
});


/* ---------------- PRODUCTS ---------------- */
let productData = {};

function loadProducts() {
  fetch(endpoint + "?action=getProductData")
    .then(r => r.json())
    .then(data => {
      productData = data;
      document.querySelectorAll(".product-row").forEach(attachRow);
    });
}

loadProducts();

function attachRow(row) {

  const dropdown = row.querySelector(".product-dropdown");
  const rounds = row.querySelector(".rounds-input");
  const qty = row.querySelector(".quantity-display");

  function calc() {
    const p = dropdown.value;
    const r = parseFloat(rounds.value) || 0;
    const rate = productData[p];

    if (!p || !rate || !r) {
      qty.value = "";
      return;
    }

    qty.value = r * rate;
  }

  dropdown.addEventListener("change", calc);
  rounds.addEventListener("input", calc);
}


/* Add rows */
document.getElementById("add-product").addEventListener("click", () => {

  const container = document.getElementById("products-container");
  const rows = container.querySelectorAll(".product-row");

  if (rows.length >= 10) return alert("Max 10 rows");

  const clone = rows[0].cloneNode(true);
  clone.querySelectorAll("input,select").forEach(x => x.value = "");

  container.appendChild(clone);
  attachRow(clone);
});

</script>

</body>
</html>
